name: daily-update

# 11:17 UTC daily (~07:17 US-Eastern / 19:17 Asia-Shanghai). Off the top of the
# hour on purpose: GitHub delays/skips scheduled runs most at :00 (high load).
on:
  schedule:
    - cron: "17 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build earnings calendar + site
        run: python -m src.pipeline --throttle 0.25 --site-dir site

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A outputs
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily earnings refresh $(date -u +%F)"
            git push
          fi

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
