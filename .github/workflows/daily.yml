name: daily-update

# 05:20 UTC daily = just after US-Eastern midnight (the start of the US trading
# day; ~13:20 Asia-Shanghai). "today" is computed in US/Eastern, so the view is
# correct even if GitHub delays the run by hours. Off the top of the hour on
# purpose (GitHub delays/skips :00 runs most).
on:
  schedule:
    - cron: "20 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build earnings calendar + site
        run: python -m src.pipeline --throttle 0.25 --site-dir site

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A outputs
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily earnings refresh $(date -u +%F)"
            git push
          fi

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5
